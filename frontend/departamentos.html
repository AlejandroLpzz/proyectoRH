<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Departamentos - Sistema RH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-100">

  <div class="flex h-screen">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto">

      <header class="bg-white p-4 border-b flex justify-between items-center">
        <div>
          <h1 class="text-xl font-semibold">Departamentos</h1>
          <p class="text-gray-500 text-sm">Administración de áreas dentro de la empresa</p>
        </div>
        <button id="btnNuevoDepto" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">+ Añadir Departamento</button>
      </header>

      <div id="modalDepto" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-96">
          <h2 id="tituloModalDepto" class="text-lg font-bold mb-4">Datos del Departamento</h2>
          
          <label class="block text-sm font-medium text-gray-700">Nombre</label>
          <input id="nombreDepto" placeholder="Ej: Tecnología" class="border w-full p-2 mb-3 rounded outline-none focus:ring-2 focus:ring-blue-400">
          
          <label class="block text-sm font-medium text-gray-700">Responsable</label>
          <input id="responsableDepto" placeholder="Nombre del jefe de área" class="border w-full p-2 mb-3 rounded outline-none focus:ring-2 focus:ring-blue-400">
          
          <label class="block text-sm font-medium text-gray-700">Estado</label>
          <select id="estadoDepto" class="border w-full p-2 mb-4 rounded outline-none focus:ring-2 focus:ring-blue-400">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
          
          <div class="flex justify-end gap-2">
            <button onclick="document.getElementById('modalDepto').style.display='none'" class="px-4 py-2 text-gray-500 hover:text-gray-700">Cancelar</button>
            <button id="guardarDepto" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Guardar</button>
          </div>
        </div>
      </div>

      <section class="p-6">

        <input 
          type="text"
          placeholder="Buscar departamento..."
          class="border p-2 rounded w-full mb-6 outline-none focus:ring-2 focus:ring-blue-400"
          id="buscarDepartamento"
        >

        <div class="grid grid-cols-4 gap-6 mb-8" id="contenedorTarjetas">
          </div>

        <div class="bg-white p-6 rounded shadow mb-8">
          <div class="flex justify-between mb-4">
            <h3 class="text-lg font-semibold">Lista de Departamentos</h3>
            <div>
              <button class="border px-3 py-1 rounded hover:bg-gray-50">Filtrar</button>
              <button class="border px-3 py-1 rounded ml-2 hover:bg-gray-50" onclick="window.print()">Exportar</button>
            </div>
          </div>

          <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 border-b">
              <tr>
                <th class="p-3 text-sm font-semibold text-gray-600 uppercase">Departamento</th>
                <th class="p-3 text-sm font-semibold text-gray-600 uppercase">Responsable</th>
                <th class="p-3 text-sm font-semibold text-gray-600 uppercase text-center">Empleados</th>
                <th class="p-3 text-sm font-semibold text-gray-600 uppercase">Estado</th>
                <th class="p-3 text-sm font-semibold text-gray-600 uppercase text-right">Acciones</th>
              </tr>
            </thead>

            <tbody id="tablaDepartamentos">
              <tr>
                <td colspan="5" class="p-6 text-center text-gray-400 italic">Cargando información de áreas...</td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div class="grid grid-cols-3 gap-6">
          <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500">
            <h3 class="text-gray-500 text-sm">Total Departamentos</h3>
            <p id="totalDeptos" class="text-2xl font-bold mt-1">0</p>
          </div>
          <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
            <h3 class="text-gray-500 text-sm">Departamentos Activos</h3>
            <p id="deptosActivos" class="text-2xl font-bold mt-1">0</p>
          </div>
          <div class="bg-white p-4 rounded shadow border-l-4 border-purple-500">
            <h3 class="text-gray-500 text-sm">Estado General</h3>
            <p id="promedioEmpleados" class="text-2xl font-bold mt-1">OK</p>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="js/menu.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
