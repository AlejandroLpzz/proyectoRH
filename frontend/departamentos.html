<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departamentos - Sistema RH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-100">

  <div class="flex h-screen">
    <!-- Sidebar dinámico -->
    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col overflow-hidden">

      <header class="bg-white p-4 border-b flex justify-between items-center shrink-0">
        <div>
          <h1 class="text-xl font-semibold text-gray-800">Departamentos</h1>
          <p class="text-gray-500 text-sm">Administración de áreas dentro de la empresa</p>
        </div>
        <button id="btnNuevoDepto" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition-colors font-medium">
          + Añadir Departamento
        </button>
      </header>

      <!-- Modal de Departamento -->
      <div id="modalDepto" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md transform transition-all">
          <div class="flex justify-between items-center mb-5 border-b pb-3">
            <h2 id="tituloModalDepto" class="text-xl font-bold text-gray-800">Datos del Departamento</h2>
            <button
              onclick="document.getElementById('modalDepto').style.display='none'"
              class="text-gray-400 hover:text-gray-600 text-2xl"
            >
              &times;
            </button>
          </div>
          
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre del Área</label>
              <input id="nombreDepto" type="text" placeholder="Ej: Tecnología" class="border border-gray-300 w-full p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Responsable / Jefe</label>
              <input id="responsableDepto" type="text" placeholder="Nombre del jefe de área" class="border border-gray-300 w-full p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Estado Operativo</label>
              <select id="estadoDepto" class="border border-gray-300 w-full p-2.5 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-400">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          
          <div class="flex justify-end gap-3 mt-8">
            <button onclick="document.getElementById('modalDepto').style.display='none'" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-medium">
              Cancelar
            </button>
            <button id="guardarDepto" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium shadow-md transition-all">
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>

      <section class="p-6 overflow-y-auto">

        <!-- Buscador -->
        <div class="bg-white p-4 rounded shadow mb-6">
          <div class="relative">
            <input 
              type="text"
              placeholder="Buscar por nombre de departamento..."
              class="border border-gray-300 p-2 rounded-lg w-full outline-none focus:border-blue-400 bg-white shadow-sm"
              id="buscarDepartamento"
            >
          </div>
        </div>

        <!-- Contenedor de Tarjetas (Opcional si usas Grid de Cards) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="contenedorTarjetas">
          <!-- Aquí pueden ir tarjetas de resumen rápido -->
        </div>

        <!-- Tabla de Departamentos -->
        <div class="bg-white rounded shadow overflow-hidden mb-8">
          <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-800">Lista de Áreas</h3>
            <div class="flex gap-2">
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="bg-gray-50">
                <tr class="text-gray-600 text-sm uppercase">
                  <th class="p-4 font-semibold">Departamento</th>
                  <th class="p-4 font-semibold">Responsable</th>
                  <th class="p-4 font-semibold text-center">Empleados</th>
                  <th class="p-4 font-semibold">Estado</th>
                  <th class="p-4 font-semibold text-right">Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaDepartamentos" class="divide-y divide-gray-100">
                <!-- Estado de Carga Inicial -->
                <tr>
                  <td colspan="5" class="p-8 text-center text-gray-400">
                    <div class="flex flex-col items-center">
                      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-2"></div>
                      <p>Sincronizando departamentos...</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        
        <!-- Métricas de Resumen Inferiores -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-6">
          <div class="bg-white p-5 rounded shadow border-l-4 border-blue-500">
            <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Total Departamentos</h3>
            <p id="totalDeptos" class="text-2xl font-bold text-gray-800 mt-1">0</p>
          </div>
          <div class="bg-white p-5 rounded shadow border-l-4 border-green-500">
            <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Áreas Activas</h3>
            <p id="deptosActivos" class="text-2xl font-bold text-gray-800 mt-1">0</p>
          </div>
          <div class="bg-white p-5 rounded shadow border-l-4 border-purple-500">
            <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Estado del Sistema</h3>
            <p id="promedioEmpleados" class="text-xl font-bold text-green-600 mt-1 uppercase">Operativo</p>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="js/menu.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Filtro de búsqueda local para la tabla
    document.getElementById("buscarDepartamento").addEventListener("input", (e) => {
        const texto = e.target.value.toLowerCase();
        const filas = document.querySelectorAll("#tablaDepartamentos tr");
        filas.forEach(fila => {
            if(fila.cells.length > 1) {
                const nombre = fila.cells[0].innerText.toLowerCase();
                fila.style.display = nombre.includes(texto) ? "" : "none";
            }
        });
    });
  </script>

</body>
</html>
