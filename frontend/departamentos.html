<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departamentos - Sistema RH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-100">

  <div class="flex h-screen">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto">

      <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-10">
        <div>
          <h1 class="text-xl font-semibold text-gray-800">Departamentos</h1>
          <p class="text-gray-500 text-sm">Administración de áreas dentro de la empresa</p>
        </div>
        <button id="btnNuevoDepto" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition-colors font-medium">
          + Añadir Departamento
        </button>
      </header>

      <div id="modalDepto" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-96 transform transition-all">
          <h2 id="tituloModalDepto" class="text-lg font-bold mb-4 text-gray-800">Datos del Departamento</h2>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Área</label>
              <input id="nombreDepto" type="text" placeholder="Ej: Tecnología" class="border w-full p-2 rounded outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Responsable / Jefe</label>
              <input id="responsableDepto" type="text" placeholder="Nombre del jefe de área" class="border w-full p-2 rounded outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Estado Operativo</label>
              <select id="estadoDepto" class="border w-full p-2 rounded outline-none focus:ring-2 focus:ring-blue-400">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          
          <div class="flex justify-end gap-2 mt-6">
            <button onclick="document.getElementById('modalDepto').style.display='none'" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-medium">
              Cancelar
            </button>
            <button id="guardarDepto" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-medium shadow">
              Guardar
            </button>
          </div>
        </div>
      </div>

      <section class="p-6">

        <div class="relative mb-6">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
          </span>
          <input 
            type="text"
            placeholder="Buscar por nombre de departamento..."
            class="border p-2 pl-10 rounded-lg w-full outline-none focus:ring-2 focus:ring-blue-400 bg-white shadow-sm"
            id="buscarDepartamento"
          >
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="contenedorTarjetas">
          </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-8">
          <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-700">Lista Detallada</h3>
            <div class="flex gap-2">
              <button class="bg-white border px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-50">Filtrar</button>
              <button class="bg-white border px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-50" onclick="window.print()">Exportar PDF</button>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b">
                  <th class="p-4 font-semibold">Departamento</th>
                  <th class="p-4 font-semibold">Responsable</th>
                  <th class="p-4 font-semibold text-center">Empleados</th>
                  <th class="p-4 font-semibold">Estado</th>
                  <th class="p-4 font-semibold text-right">Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaDepartamentos" class="divide-y divide-gray-100">
                <tr>
                  <td colspan="5" class="p-8 text-center text-gray-400">
                    <div class="flex flex-col items-center">
                      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-2"></div>
                      <p>Sincronizando departamentos...</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500">
            <h3 class="text-gray-400 text-xs font-bold uppercase">Total Departamentos</h3>
            <p id="totalDeptos" class="text-3xl font-bold text-gray-800 mt-1">0</p>
          </div>
          <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500">
            <h3 class="text-gray-400 text-xs font-bold uppercase">Áreas Activas</h3>
            <p id="deptosActivos" class="text-3xl font-bold text-gray-800 mt-1">0</p>
          </div>
          <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-500">
            <h3 class="text-gray-400 text-xs font-bold uppercase">Estado del Sistema</h3>
            <p id="promedioEmpleados" class="text-xl font-bold text-green-600 mt-1">OPERATIVO</p>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="js/menu.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.getElementById("buscarDepartamento").addEventListener("input", (e) => {
        const texto = e.target.value.toLowerCase();
        const filas = document.querySelectorAll("#tablaDepartamentos tr");
        filas.forEach(fila => {
            // Solo filtramos si la fila tiene datos (evitamos la fila de carga)
            if(fila.cells.length > 1) {
                const nombre = fila.cells[0].innerText.toLowerCase();
                fila.style.display = nombre.includes(texto) ? "" : "none";
            }
        });
    });
  </script>

</body>
</html>
