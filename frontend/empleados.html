<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de empleados - Sistema RH</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-100">

  <!-- Contenedor principal con sidebar dinámico -->
  <div class="flex h-screen">

    <!-- Sidebar cargado dinámicamente -->
    <div id="sidebar-container"></div>

    <!-- Contenido principal -->
    <main class="flex-1">

      <!-- Encabezado de la sección -->
      <header class="bg-white p-4 border-b flex justify-between items-center">
        <!-- Título y subtítulo -->
        <div>
          <h1 class="text-xl font-semibold">Gestión de empleados</h1>
          <p class="text-gray-500 text-sm">Administración del personal de la empresa</p>
        </div>

        <!-- Botones de acción -->
        <div class="flex gap-2">
          <button class="border px-3 py-2 rounded">Exportar</button>
          <button class="bg-blue-600 text-white px-4 py-2 rounded">+ Nuevo Empleado</button>
        </div>
      </header>

      <section class="p-6">

        <!-- Tarjetas de resumen de empleados -->
        <div class="grid grid-cols-4 gap-6 mb-6">
          <div class="bg-white p-4 rounded shadow">
            <h3 class="text-gray-500 text-sm">Total empleados</h3>
            <p id="totalEmpleados" class="text-2xl font-semibold mt-2">--</p>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <h3 class="text-gray-500 text-sm">Activos</h3>
            <p id="empleadosActivos" class="text-2xl font-semibold mt-2">--</p>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <h3 class="text-gray-500 text-sm">Vacaciones</h3>
            <p id="empleadosVacaciones" class="text-2xl font-semibold mt-2">--</p>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <h3 class="text-gray-500 text-sm">Inactivos</h3>
            <p id="empleadosInactivos" class="text-2xl font-semibold mt-2">--</p>
          </div>
        </div>

        <!-- Buscador y filtros -->
        <div class="bg-white p-4 rounded shadow mb-6 flex justify-between">
          <input 
            type="text"
            placeholder="Buscar empleado..."
            class="border p-2 rounded w-1/3"
            id="buscarEmpleado"
          >
          <div class="flex gap-2">
            <button class="border px-3 py-2 rounded">Departamento</button>
            <button class="border px-3 py-2 rounded">Estado</button>
            <button class="border px-3 py-2 rounded">Filtrar</button>
          </div>
        </div>

        <!-- Tabla de empleados -->
        <div class="bg-white p-6 rounded shadow">
          <div class="flex justify-between mb-4">
            <h3 class="text-lg font-semibold">Lista de empleados</h3>
            <div class="flex gap-2">
              <button class="border px-3 py-1 rounded">Ordenar</button>
              <button class="border px-3 py-1 rounded">Actualizar</button>
            </div>
          </div>

          <table class="w-full">
            <thead class="bg-gray-100">
              <tr>
                <th class="p-3 text-left">Empleado</th>
                <th class="p-3 text-left">Departamento</th>
                <th class="p-3 text-left">Rol</th>
                <th class="p-3 text-left">Estado</th>
                <th class="p-3 text-left">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaEmpleados">
              <!-- Backend insertará los empleados aquí -->
            </tbody>
          </table>
        </div>

        <!-- Estadísticas adicionales -->
        <div class="grid grid-cols-3 gap-6 mt-6">
          <div class="bg-white p-4 rounded shadow">
            <h3>Contrataciones este mes</h3>
            <p id="contratacionesMes" class="text-xl font-semibold mt-2">--</p>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <h3>Departamentos activos</h3>
            <p id="departamentosActivos" class="text-xl font-semibold mt-2">--</p>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <h3>Promedio de antigüedad</h3>
            <p id="promedioAntiguedad" class="text-xl font-semibold mt-2">--</p>
          </div>
        </div>

      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="js/menu.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
