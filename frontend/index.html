<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sistema RH</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/estilos.css">

</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<div id="sidebar-container"></div>

<!-- Contenido -->
<main class="flex-1">

<!-- Barra superior -->

<header class="bg-white p-4 border-b flex justify-between items-center">

<input 
type="text"
placeholder="Buscar..."
class="border p-2 rounded w-1/3"
>

<div id="userInfo" class="flex items-center gap-3">

<div class="text-sm text-gray-600">
<!-- nombre usuario backend -->
</div>

<div class="w-8 h-8 bg-gray-300 rounded-full"></div>

</div>

</header>


<section class="p-6">

<!-- Métricas principales -->

<div class="grid grid-cols-4 gap-6 mb-6">

<div class="bg-white p-4 rounded shadow">

<h2 class="text-gray-500 text-sm">Total de empleados</h2>

<p id="totalEmpleados" class="text-2xl font-semibold mt-2">
--
</p>

</div>

<div class="bg-white p-4 rounded shadow">

<h2 class="text-gray-500 text-sm">Departamentos</h2>

<p id="totalDepartamentos" class="text-2xl font-semibold mt-2">
--
</p>

</div>

<div class="bg-white p-4 rounded shadow">

<h2 class="text-gray-500 text-sm">Nómina mensual</h2>

<p id="nominaMensual" class="text-2xl font-semibold mt-2">
--
</p>

</div>

<div class="bg-white p-4 rounded shadow">

<h2 class="text-gray-500 text-sm">Contrataciones este mes</h2>

<p id="contratacionesMes" class="text-2xl font-semibold mt-2">
--
</p>

</div>

</div>


<!-- Sección principal -->

<div class="grid grid-cols-2 gap-6">

<!-- Actividad reciente -->

<div class="bg-white p-6 rounded shadow">

<h3 class="text-lg font-semibold mb-4">
Actividad reciente
</h3>

<ul id="actividadReciente" class="space-y-3 text-sm text-gray-600">

<!-- backend insertará actividades -->

</ul>

</div>


<!-- Alertas -->

<div class="bg-white p-6 rounded shadow">

<h3 class="text-lg font-semibold mb-4">
Alertas del sistema
</h3>

<ul id="alertasSistema" class="space-y-3 text-sm text-gray-600">

<!-- backend insertará alertas -->

</ul>

</div>

</div>


<!-- Accesos rápidos -->

<div class="grid grid-cols-3 gap-6 mt-6">

<a href="empleados.html" class="bg-white p-6 rounded shadow hover:bg-gray-50">

<h3 class="font-semibold mb-2">
Gestión de empleados
</h3>

<p class="text-sm text-gray-500">
Administrar personal y roles
</p>

</a>

<a href="departamentos.html" class="bg-white p-6 rounded shadow hover:bg-gray-50">

<h3 class="font-semibold mb-2">
Departamentos
</h3>

<p class="text-sm text-gray-500">
Organizar áreas de trabajo
</p>

</a>

<a href="nomina.html" class="bg-white p-6 rounded shadow hover:bg-gray-50">

<h3 class="font-semibold mb-2">
Gestión de nómina
</h3>

<p class="text-sm text-gray-500">
Control de pagos y salarios
</p>

</a>

</div>

</section>

</main>

</div>

<script src="js/menu.js"></script>
<script src="js/app.js"></script>

</body>
</html>
